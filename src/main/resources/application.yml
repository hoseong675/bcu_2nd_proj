spring:
  application:
    name: pcquote
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/pc_quote?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: ${DB_USER:pcquote}
    password: ${DB_PASSWORD:PcQuote2026!}
  jpa:
    hibernate:
      ddl-auto: none          # 스키마는 schema.sql 로 이미 관리
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

# Google AI Studio (Gemini) 설정 - 키는 반드시 환경변수로 주입
gemini:
  base-url: https://generativelanguage.googleapis.com
  api-key: ${GEMINI_API_KEY:}
  model: gemini-2.5-flash

# 네이버 쇼핑 검색 API (가격 배치) - 자격증명은 환경변수로 주입
naver:
  base-url: https://openapi.naver.com
  client-id: ${NAVER_CLIENT_ID:}
  client-secret: ${NAVER_CLIENT_SECRET:}
  # 새벽 배치 cron (기본 매일 04:00). 빈 값이면 스케줄 비활성.
  batch-cron: ${NAVER_BATCH_CRON:0 0 4 * * *}

# 관리자 엔드포인트(/api/admin/**) 보호용 시크릿 - 환경변수로 주입
admin:
  token: ${ADMIN_TOKEN:}

server:
  port: 8080
  # 프록시(Tailscale Funnel) 뒤에서 실제 클라이언트 정보/HTTPS 인식
  forward-headers-strategy: native
